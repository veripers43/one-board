<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다항분포 계산기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f5f6fa;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 13px;
    color: #8888a0;
    margin-bottom: 28px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    border: 0.5px solid #e0e0ec;
    padding: 24px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: #8888a0;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .field-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .field-row:last-child { margin-bottom: 0; }

  .field-label {
    font-size: 14px;
    color: #555570;
    width: 110px;
    flex-shrink: 0;
  }

  .field-label span {
    font-size: 11px;
    color: #aaaabc;
    display: block;
    margin-top: 1px;
  }

  input[type="number"] {
    flex: 1;
    height: 40px;
    border: 0.5px solid #d8d8ea;
    border-radius: 8px;
    padding: 0 12px;
    font-size: 14px;
    color: #1a1a2e;
    background: #fafafd;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: #6c63ff;
    background: #fff;
  }

  input[type="number"].error {
    border-color: #e24b4a;
    background: #fff8f8;
  }

  .divider {
    height: 0.5px;
    background: #ededf5;
    margin: 20px 0;
  }

  .prob-sum-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding: 10px 12px;
    background: #f5f6fa;
    border-radius: 8px;
  }

  .prob-sum-label {
    font-size: 13px;
    color: #8888a0;
  }

  .prob-sum-value {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a2e;
    font-variant-numeric: tabular-nums;
  }

  .prob-sum-value.ok { color: #1d9e75; }
  .prob-sum-value.ng { color: #e24b4a; }

  .error-msg {
    font-size: 12px;
    color: #e24b4a;
    margin-top: 8px;
    display: none;
  }

  .calc-btn {
    width: 100%;
    height: 48px;
    background: #6c63ff;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.2px;
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 16px;
  }

  .calc-btn:hover { background: #574fd6; }
  .calc-btn:active { transform: scale(0.99); }
  .calc-btn:disabled { background: #c8c8dc; cursor: not-allowed; }

  .result-card {
    background: #fff;
    border-radius: 16px;
    border: 0.5px solid #e0e0ec;
    padding: 24px;
    display: none;
  }

  .result-card.visible { display: block; }

  .result-title {
    font-size: 12px;
    font-weight: 600;
    color: #8888a0;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .result-main {
    text-align: center;
    padding: 20px 0 24px;
  }

  .result-pct {
    font-size: 48px;
    font-weight: 700;
    color: #6c63ff;
    letter-spacing: -1px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .result-fraction {
    font-size: 15px;
    color: #8888a0;
    margin-top: 8px;
  }

  .result-fraction strong {
    color: #1a1a2e;
    font-weight: 600;
  }

  .result-detail {
    border-top: 0.5px solid #ededf5;
    padding-top: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .detail-item {
    background: #f5f6fa;
    border-radius: 10px;
    padding: 12px 14px;
  }

  .detail-item-label {
    font-size: 11px;
    color: #aaaabc;
    margin-bottom: 4px;
  }

  .detail-item-value {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a2e;
    font-variant-numeric: tabular-nums;
    word-break: break-all;
  }

  .log-prob-note {
    font-size: 11px;
    color: #aaaabc;
    text-align: center;
    margin-top: 12px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>다항분포 계산기</h1>
  <p class="subtitle">3가지 결과가 있는 다항분포 확률을 계산합니다</p>

  <div class="card">
    <div class="section-title">시행 횟수</div>
    <div class="field-row">
      <div class="field-label">시행 횟수 n</div>
      <input type="number" id="n" min="1" placeholder="예: 1000" oninput="onInputChange()">
    </div>

    <div class="divider"></div>

    <div class="section-title">각 결과의 확률</div>
    <div class="field-row">
      <div class="field-label">1번 확률 p₁<span>0 초과 1 이하</span></div>
      <input type="number" id="p1" min="0" max="1" step="any" placeholder="예: 0.5" oninput="onInputChange()">
    </div>
    <div class="field-row">
      <div class="field-label">2번 확률 p₂<span>0 초과 1 이하</span></div>
      <input type="number" id="p2" min="0" max="1" step="any" placeholder="예: 0.3" oninput="onInputChange()">
    </div>
    <div class="field-row">
      <div class="field-label">3번 확률 p₃<span>0 초과 1 이하</span></div>
      <input type="number" id="p3" min="0" max="1" step="any" placeholder="예: 0.2" oninput="onInputChange()">
    </div>

    <div class="prob-sum-row">
      <span class="prob-sum-label">확률 합계 (p₁ + p₂ + p₃)</span>
      <span class="prob-sum-value" id="prob-sum">—</span>
    </div>
    <div class="error-msg" id="prob-sum-error">확률의 합이 정확히 1이어야 합니다</div>

    <div class="divider"></div>

    <div class="section-title">각 결과의 발생 횟수</div>
    <div class="field-row">
      <div class="field-label">1번 횟수 k₁</div>
      <input type="number" id="k1" min="0" placeholder="예: 500" oninput="onInputChange()">
    </div>
    <div class="field-row">
      <div class="field-label">2번 횟수 k₂</div>
      <input type="number" id="k2" min="0" placeholder="예: 300" oninput="onInputChange()">
    </div>
    <div class="field-row">
      <div class="field-label">3번 횟수 k₃</div>
      <input type="number" id="k3" min="0" placeholder="예: 200" oninput="onInputChange()">
    </div>

    <div class="prob-sum-row">
      <span class="prob-sum-label">횟수 합계 (k₁ + k₂ + k₃) / n</span>
      <span class="prob-sum-value" id="count-sum">—</span>
    </div>
    <div class="error-msg" id="count-sum-error">횟수의 합이 시행 횟수 n과 같아야 합니다</div>
  </div>

  <button class="calc-btn" id="calc-btn" onclick="calculate()" disabled>계산하기</button>

  <div class="result-card" id="result-card">
    <div class="result-title">계산 결과</div>
    <div class="result-main">
      <div class="result-pct" id="result-pct">—</div>
      <div class="result-fraction" id="result-fraction"></div>
    </div>
    <div class="log-prob-note" id="log-note" style="display:none">
      확률이 매우 작아 로그 확률로 표시됩니다
    </div>
  </div>
</div>

<script>
  /* ---- 로그 팩토리얼 (Stirling 근사 불필요, 직접 누적합) ---- */
  /* n이 수천 수준이므로 캐시 활용 */
  const logFactCache = [0];
  function logFact(n) {
    if (n < 0) return NaN;
    while (logFactCache.length <= n) {
      logFactCache.push(logFactCache[logFactCache.length - 1] + Math.log(logFactCache.length));
    }
    return logFactCache[n];
  }

  /* ---- 다항분포 로그 확률 ---- */
  function logMultinomial(n, ks, ps) {
    let lp = logFact(n);
    for (let i = 0; i < ks.length; i++) {
      lp -= logFact(ks[i]);
      lp += ks[i] * Math.log(ps[i]);
    }
    return lp;
  }

  /* ---- 숫자 포맷 ---- */
  function fmt(n, digits) {
    return n.toLocaleString('ko-KR', { maximumFractionDigits: digits });
  }

  function fmtFraction(prob) {
    if (prob <= 0) return null;
    const inv = 1 / prob;
    if (inv < 2) return null;
    if (inv >= 1e15) return null;
    if (inv >= 1e12) return Math.round(inv / 1e12) + '조 분의 1';
    if (inv >= 1e8)  return Math.round(inv / 1e8)  + '억 분의 1';
    if (inv >= 1e4)  return Math.round(inv / 1e4)  + '만 분의 1';
    return Math.round(inv).toLocaleString('ko-KR') + ' 분의 1';
  }

  /* ---- 입력 변경 시 유효성 검사 ---- */
  function onInputChange() {
    var p1 = parseFloat(document.getElementById('p1').value);
    var p2 = parseFloat(document.getElementById('p2').value);
    var p3 = parseFloat(document.getElementById('p3').value);
    var n  = parseInt(document.getElementById('n').value);
    var k1 = parseInt(document.getElementById('k1').value);
    var k2 = parseInt(document.getElementById('k2').value);
    var k3 = parseInt(document.getElementById('k3').value);

    var probSumEl  = document.getElementById('prob-sum');
    var probErrEl  = document.getElementById('prob-sum-error');
    var countSumEl = document.getElementById('count-sum');
    var countErrEl = document.getElementById('count-sum-error');
    var btn        = document.getElementById('calc-btn');

    /* 확률 합 검사 */
    var probSumOk = false;
    if (!isNaN(p1) && !isNaN(p2) && !isNaN(p3)) {
      var psum = p1 + p2 + p3;
      var psumDisp = psum.toFixed(6).replace(/\.?0+$/, '');
      probSumEl.textContent = psumDisp;
      var pok = Math.abs(psum - 1) < 1e-9;
      probSumEl.className = 'prob-sum-value ' + (pok ? 'ok' : 'ng');
      probErrEl.style.display = pok ? 'none' : 'block';
      probSumOk = pok;
    } else {
      probSumEl.textContent = '—';
      probSumEl.className = 'prob-sum-value';
      probErrEl.style.display = 'none';
    }

    /* 횟수 합 검사 */
    var countSumOk = false;
    var kFilled = !isNaN(k1) && !isNaN(k2) && !isNaN(k3);
    var nFilled = !isNaN(n) && n > 0;

    if (kFilled) {
      var kSum = k1 + k2 + k3;
      if (nFilled) {
        var cok = (kSum === n);
        countSumEl.textContent = kSum.toLocaleString('ko-KR') + ' / ' + n.toLocaleString('ko-KR');
        countSumEl.className = 'prob-sum-value ' + (cok ? 'ok' : 'ng');
        countErrEl.style.display = cok ? 'none' : 'block';
        countSumOk = cok;
      } else {
        countSumEl.textContent = '합계 ' + kSum.toLocaleString('ko-KR');
        countSumEl.className = 'prob-sum-value';
        countErrEl.style.display = 'none';
      }
    } else {
      countSumEl.textContent = '—';
      countSumEl.className = 'prob-sum-value';
      countErrEl.style.display = 'none';
    }

    var allFilled = nFilled && kFilled && !isNaN(p1) && !isNaN(p2) && !isNaN(p3);
    btn.disabled = !(allFilled && probSumOk && countSumOk);
  }

  /* ---- 계산 ---- */
  function calculate() {
    const n  = parseInt(document.getElementById('n').value);
    const p1 = parseFloat(document.getElementById('p1').value);
    const p2 = parseFloat(document.getElementById('p2').value);
    const p3 = parseFloat(document.getElementById('p3').value);
    const k1 = parseInt(document.getElementById('k1').value);
    const k2 = parseInt(document.getElementById('k2').value);
    const k3 = parseInt(document.getElementById('k3').value);

    /* 각 확률 > 0 검사 */
    if (p1 <= 0 || p2 <= 0 || p3 <= 0) {
      alert('각 확률은 0보다 커야 합니다.');
      return;
    }

    const ks = [k1, k2, k3];
    const ps = [p1, p2, p3];
    const lp = logMultinomial(n, ks, ps);
    const prob = Math.exp(lp);

    /* 결과 표시 */
    const resultCard = document.getElementById('result-card');
    resultCard.classList.add('visible');

    const isUnderflow = !isFinite(prob) || prob === 0;
    const logNote = document.getElementById('log-note');

    if (isUnderflow) {
      document.getElementById('result-pct').textContent = '≈ 0';
      document.getElementById('result-fraction').innerHTML = '';
      logNote.style.display = 'block';
    } else {
      const pct = prob * 100;
      let pctStr;
      if (pct >= 0.001) {
        pctStr = pct.toFixed(6).replace(/\.?0+$/, '') + '%';
      } else {
        pctStr = pct.toExponential(4) + '%';
      }
      document.getElementById('result-pct').textContent = pctStr;

      const frac = fmtFraction(prob);
      if (frac) {
        document.getElementById('result-fraction').innerHTML = '약 <strong>' + frac + '</strong> 확률';
      } else {
        document.getElementById('result-fraction').innerHTML = '';
      }
      logNote.style.display = 'none';
    }

    document.getElementById('detail-logp').textContent = lp.toFixed(4);
    document.getElementById('detail-counts').textContent = 'n=' + n + ', 합=' + (k1+k2+k3);
    document.getElementById('detail-prob').textContent = isUnderflow
      ? 'exp(' + lp.toFixed(2) + ')≈0'
      : prob.toExponential(4);

    const e1 = (n * p1).toFixed(1);
    const e2 = (n * p2).toFixed(1);
    const e3 = (n * p3).toFixed(1);
    document.getElementById('detail-expected').textContent = e1 + ' / ' + e2 + ' / ' + e3;

    resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
</script>
</body>
</html>
